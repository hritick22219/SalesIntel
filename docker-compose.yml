

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: sales_intel_db
    restart: always
    environment:
      POSTGRES_USER: sales_intel_user
      POSTGRES_PASSWORD: sales_intel_password
      POSTGRES_DB: sales_intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_intel_user -d sales_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Cache & Message Broker Service
  redis:
    image: redis:7-alpine
    container_name: sales_intel_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. FastAPI Backend Web API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales_intel_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://sales_intel_user:sales_intel_password@db:5432/sales_intel
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=supersecretkeychangeinproduction
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # 4. Celery Asynchronous Background Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales_intel_worker
    restart: always
    working_dir: /app/app
    command: celery -A worker.tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://sales_intel_user:sales_intel_password@db:5432/sales_intel
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=supersecretkeychangeinproduction
      - JWT_ALGORITHM=HS256
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # 5. React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: sales_intel_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
