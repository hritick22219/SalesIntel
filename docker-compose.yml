services:
  # 1. Redis Cache & Message Broker Service
  redis:
    image: redis:7-alpine
    container_name: sales_intel_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 2. FastAPI Backend Web API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales_intel_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=supersecretkeychangeinproduction
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      - redis

  # 3. Celery Asynchronous Background Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales_intel_worker
    restart: always
    working_dir: /app/app
    command: celery -A worker.tasks.celery_app worker --loglevel=info
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=supersecretkeychangeinproduction
      - JWT_ALGORITHM=HS256
    depends_on:
      - redis

  # 4. React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: sales_intel_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  redis_data:
